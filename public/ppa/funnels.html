<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Post-purchase funnels — Post-purchase Canvas</title>
<link rel="stylesheet" href="assets/styles.css" />
<link rel="stylesheet" href="assets/canvas-theme.css" />
<script src="assets/theme.js"></script>
</head>
<body data-page="funnel-list">
<div class="shell">

  <header class="page-head">
    <h1>Post-purchase funnels <span class="help-dot">?</span></h1>
    <div class="head-controls">
      <div class="theme-switch" data-theme-toggle></div>
      <div class="popover-anchor">
        <button class="btn" id="dateRangeBtn">🗓 <span id="dateRangeLabel">Last 30 days</span> <span class="caret">▾</span></button>
        <div class="date-popover" id="datePopover"></div>
      </div>
    </div>
  </header>

  <!-- funnel table -->
  <div class="card table-card">
    <div style="display:flex;align-items:center;justify-content:space-between;padding-right:12px">
      <div class="list-tabs">
        <button aria-selected="true">All</button>
        <button aria-selected="false">Active</button>
        <button aria-selected="false">Inactive</button>
      </div>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" title="Search and filter">⌕</button>
        <button class="icon-btn" title="More">⋯</button>
      </div>
    </div>
    <table class="funnel-list">
      <thead>
        <tr>
          <th style="width:32px"></th>
          <th>Priority ⇅</th>
          <th>Name</th>
          <th class="num">RPV (PPU)</th>
          <th class="num">RPV (TYP)</th>
          <th class="num">Visits</th>
          <th class="num">Revenue</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="funnelRows"></tbody>
    </table>
  </div>

  <p class="page-footnote">Learn more about <a href="#">post-purchase funnels</a></p>
  <p class="page-footnote"><a href="index.html">← Back to Analytics</a></p>
</div>

<script src="assets/data.js"></script>
<script src="assets/datepicker.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
